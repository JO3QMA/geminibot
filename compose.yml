version: '3.8'

services:
  geminibot:
    build: .
    container_name: geminibot
    environment:
      # Discord設定
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      
      # Gemini設定
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-pro}
      - GEMINI_MAX_TOKENS=${GEMINI_MAX_TOKENS:-1000}
      - GEMINI_TEMPERATURE=${GEMINI_TEMPERATURE:-0.7}
      
      # データベース設定
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=${POSTGRES_PORT:-5432}
      - POSTGRES_DB=${POSTGRES_DB:-geminibot}
      - POSTGRES_USER=${POSTGRES_USER:-geminibot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_SSL_MODE=${POSTGRES_SSL_MODE:-disable}
      
      # Redis設定
      - REDIS_HOST=redis
      - REDIS_PORT=${REDIS_PORT:-6379}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB:-0}
      
      # Bot設定
      - BOT_SYSTEM_PROMPT=${BOT_SYSTEM_PROMPT:-あなたは親切で役立つアシスタントです。}
      - BOT_MAX_CONTEXT_LENGTH=${BOT_MAX_CONTEXT_LENGTH:-4000}
      - BOT_MAX_HISTORY_LENGTH=${BOT_MAX_HISTORY_LENGTH:-50}
      - BOT_REQUEST_TIMEOUT=${BOT_REQUEST_TIMEOUT:-30s}
      
      # ログ設定
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - LOG_FORMAT=${LOG_FORMAT:-json}
      
      # アプリケーション設定
      - APP_ENV=${APP_ENV:-production}
      - APP_DEBUG=${APP_DEBUG:-false}
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
      - ./configs:/app/configs:ro
      - /tmp:/tmp
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - geminibot-network
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/health.json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  postgres:
    image: postgres:15-alpine
    container_name: geminibot-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-geminibot}
      - POSTGRES_USER=${POSTGRES_USER:-geminibot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_INITDB_ARGS=${POSTGRES_INITDB_ARGS:-}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
      - ./scripts/migrations:/docker-entrypoint-initdb.d/migrations:ro
    restart: unless-stopped
    networks:
      - geminibot-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-geminibot} -d ${POSTGRES_DB:-geminibot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  redis:
    image: redis:7-alpine
    container_name: geminibot-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD} --maxmemory ${REDIS_MAX_MEMORY:-256mb} --maxmemory-policy ${REDIS_MAX_MEMORY_POLICY:-allkeys-lru}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
      - ./configs/redis.conf:/usr/local/etc/redis/redis.conf:ro
    restart: unless-stopped
    networks:
      - geminibot-network
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "incr", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  geminibot-network:
    driver: bridge
