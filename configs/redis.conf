# Redis設定ファイル
# メモリ管理
maxmemory 256mb
maxmemory-policy allkeys-lru

# 永続化設定
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# ネットワーク設定
bind 0.0.0.0
port 6379
tcp-backlog 511
timeout 0
tcp-keepalive 300

# ログ設定
loglevel notice
logfile ""

# セキュリティ設定
protected-mode yes

# パフォーマンス設定
databases 16
hash-max-ziplist-entries 512
hash-max-ziplist-value 64
list-max-ziplist-size -2
set-max-intset-entries 512
zset-max-ziplist-entries 128
zset-max-ziplist-value 64

# クライアント設定
maxclients 10000

# スナップショット設定
stop-writes-on-bgsave-error yes
rdbcompression yes
rdbchecksum yes
dbfilename dump.rdb
dir ./
