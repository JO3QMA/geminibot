version: '3.8'

services:
  geminibot:
    build: .
    container_name: geminibot
    environment:
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-geminibot}
      - POSTGRES_USER=${POSTGRES_USER:-geminibot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-geminibot_password}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=0
    restart: unless-stopped
    volumes:
      - ./logs:/app/logs
    depends_on:
      - postgres
      - redis
    networks:
      - geminibot-network

  postgres:
    image: postgres:15-alpine
    container_name: geminibot-postgres
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-geminibot}
      - POSTGRES_USER=${POSTGRES_USER:-geminibot}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-geminibot_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
    restart: unless-stopped
    networks:
      - geminibot-network

  redis:
    image: redis:7-alpine
    container_name: geminibot-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - geminibot-network

volumes:
  postgres_data:
  redis_data:

networks:
  geminibot-network:
    driver: bridge
