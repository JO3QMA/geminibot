# PostgreSQL設定ファイル
# 日本語全文検索機能を有効にする

# ロケール設定
lc_messages = 'C'
lc_monetary = 'C'
lc_numeric = 'C'
lc_time = 'C'

# 全文検索設定
default_text_search_config = 'japanese'

# メモリ設定
shared_buffers = 128MB
work_mem = 4MB
maintenance_work_mem = 64MB

# ログ設定
log_statement = 'all'
log_destination = 'stderr'
logging_collector = on
log_directory = 'log'
log_filename = 'postgresql-%Y-%m-%d_%H%M%S.log'
log_rotation_age = 1d
log_rotation_size = 100MB
